<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A fast, bilingual (EN/VI), offline-capable glossary of 57 insurance terms — search instantly, browse by category, and follow related concepts."
    />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />

    <!-- Set theme + language before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('glossary-theme');
          if (!t)
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
          var l = localStorage.getItem('glossary-lang');
          if (l) document.documentElement.lang = l;
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Insurance Glossary · Từ điển Bảo hiểm</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
